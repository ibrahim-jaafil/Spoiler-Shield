<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="popup.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <title>Spoiler Shield</title>


</head>
<body>
    
<h1>Spoiler Shield</h1>

<div class="container">
    <button id="toggleButton"><i class="fa-solid fa-power-off"></i></button>
    
    </div>
<div class="inputs">
    <label >Enter keywords to block (comma separated):</label>
    <input type="text" id="keywords" placeholder="e.g. Game of Thrones, Avengers">
    <p id="message"></p>
    <div clas="buttons">
        <button id="saveButton">Save</button>
    <button id="ClearButton">Clear</button>
    </div>
    
</div>
<script src="popup.js"></script>
</body>
</html>
